name: checkingo
description: "CheckinGo - Social discovery platform for food and travel in Vietnam."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_staggered_grid_view: ^0.7.0
  flutter_map: ^8.0.0
  latlong2: ^0.9.1
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.3.7
  image_picker: ^1.1.2
  provider: ^6.1.2
  intl: ^0.20.2
  http: ^1.6.0
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
